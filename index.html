<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HMCM Planning</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="topbrand">HMCM <b>Planning</b></div>
<aside id="sidebar">
  <a class="brand" href="#/">HMCM Planning<span>CM기획팀 업무 관리</span></a>
  <nav>
    <a href="#/" data-route="/">대시보드</a>
    <a href="#/tasks" data-route="/tasks">WBS 진행 현황</a>
    <a href="#/wbs" data-route="/wbs">WBS 관리 (팀장)</a>
    <a href="#/issues" data-route="/issues">WBS별 이슈</a>
    <a href="#/weekly" data-route="/weekly">주간 업무 요약</a>
    <a href="#/daily" data-route="/daily">일일 기록 (ERP)</a>
    <a href="#/deliverables" data-route="/deliverables">참고자료</a>
    <a href="#/docs" data-route="/docs">HMCM Mock-up</a>
    <a href="#/attendance" data-route="/attendance">근태</a>
    <a href="#/suggest" data-route="/suggest">건의사항</a>
    <a href="#/notes" data-route="/notes">운영 규칙</a>
  </nav>
  <div id="auth-box">
    <div id="presence" class="hidden"></div>
    <div id="notif-bell" class="hidden"></div>
    <div id="auth-user" class="hidden"><span id="auth-email"></span><button id="btn-logout" class="btn sm ghost">로그아웃</button></div>
    <form id="auth-form">
      <input type="text" id="login-empno" placeholder="사번" autocomplete="username" required>
      <input type="password" id="login-pw" placeholder="비밀번호" autocomplete="current-password" required>
      <button class="btn sm" type="submit">로그인</button>
      <p class="hint">읽기는 로그인 없이 가능. 등록·수정은 로그인 필요.</p>
    </form>
  </div>
</aside>
<main id="app"><div class="loading">불러오는 중…</div></main>
<div id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="js/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
